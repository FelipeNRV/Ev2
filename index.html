<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form class="contenedor"><!-- //nombre, apellido, cargo y correo electrónico corporativo// -->
        <h1>Formulario de Registro</h1>

        <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Juan">
            <p id="error-nombre" class="error"></p>
        </div>

        <div class="campo">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Perez">
            <p id="error-apellido" class="error"></p>
        </div>

        <div class="campo">
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" placeholder="Empleado">
            <p id="error-cargo" class="error"></p>
        </div>

        <div class="campo">
            <label for="correo">Correo electrónico</label>
            <input type="text" id="correo" placeholder="JuanPerez@empresa.cl">
            <p id="error-correo" class="error"></p>
        </div>

        <button id="registrar-btn">Registrarse</button>

    </form>

    <div>
        <table border="1">
        <h2>Colaboradores Registrados</h2>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cargo</th>
                    <th>Correo</th>
                </tr>
            </thead>
            <tbody>
                <tr>

                </tr>
            </tbody>
        </table>
    </div>
    <header></header>
    <main></main>
    <footer></footer>

    
</body>
</html>
